name: LapKey Build & Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*' # Memicu release jika ada tag seperti v1.0, v1.1, dll.
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # Langkah Penandatanganan APK (Signing)
    - name: Sign APK
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: app/build/outputs/apk/debug
        signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
        alias: ${{ secrets.KEY_ALIAS }}
        keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}

    # Upload sebagai Artifact (Bisa didownload di tab Actions)
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LapKey-Debug-APK
        path: ${{ steps.sign_app.outputs.signedReleaseFile }}

    # Membuat Release Otomatis (Hanya jika push menggunakan Tag)
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: ${{ steps.sign_app.outputs.signedReleaseFile }}
        name: LapKey Release ${{ github.ref_name }}
        tag_name: ${{ github.ref }}
        body: |
          ### LapKey Update - Versi ${{ github.ref_name }}
          Pembaruan terbaru untuk proyek LapKey oleh Hastagaming.
          
          **Log Perubahan:**
          - Penambahan Toolbar AI (Ikon Grid).
          - Implementasi Suggestion Bar (Baris Saran).
          - Perbaikan Layout QWERTY dan Baris Angka.
          - APK sudah ditandatangani (Signed).
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
