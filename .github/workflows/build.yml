name: LapKey Auto Release

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Wajib untuk membuat tag & release otomatis

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Mengambil semua riwayat agar bisa hitung commit

    - name: Set Version Name
      run: |
        # Menghitung jumlah commit sebagai nomor versi (misal: v1.0.45)
        COUNT=$(git rev-list --count HEAD)
        VERSION="v1.0.$COUNT"
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Auto-increment version: $VERSION"

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Sign APK
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: app/build/outputs/apk/debug
        signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
        alias: ${{ secrets.KEY_ALIAS }}
        keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}
      env:
        BUILD_TOOLS_VERSION: "34.0.0"

    - name: Prepare Final APK
      run: |
        NEW_NAME="LapKey-${{ env.VERSION }}.apk"
        mv ${{ steps.sign_app.outputs.signedReleaseFile }} app/build/outputs/apk/debug/${NEW_NAME}
        echo "FINAL_APK_PATH=app/build/outputs/apk/debug/${NEW_NAME}" >> $GITHUB_ENV

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ env.FINAL_APK_PATH }}
        name: LapKey Release ${{ env.VERSION }}
        tag_name: ${{ env.VERSION }}
        body: |
          ### Auto-Generated Release
          - Versi: ${{ env.VERSION }}
          - Build otomatis dari push ke branch main.
          - Komandan Nasa tidak perlu buat tag manual lagi!
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
